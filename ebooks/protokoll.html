<script src="../js/vault.js"></script>
<script src="../js/analytics.js"></script>

<script src="../js/i18n.js"></script>
<script src="../js/main.js"></script>
<script src="../js/affiliates.js"></script>
<script>
(function () {
  "use strict";
  var gate = document.getElementById("protoGate");
  var content = document.getElementById("protoContent");
  var input = document.getElementById("protoCode");
  var btn = document.getElementById("protoUnlock");
  var err = document.getElementById("protoErr");
  var STORE = "mm_protokoll_code";

  var SCROLL_KEY = "mm_protokoll_scroll";
  function show(html) {
    content.innerHTML = html;
    gate.hidden = true; content.hidden = false;
    if (window.MM && MM.track) MM.track("protokoll_unlocked", {});
    setupReading();
  }
  function setupReading() {
    // Zurück-zum-Inhalt (erscheint beim Scrollen)
    var top = document.createElement("button");
    top.type = "button"; top.textContent = "↑ Inhalt"; top.setAttribute("aria-label", "Zum Inhaltsverzeichnis");
    top.className = "no-print";
    top.style.cssText = "position:fixed;right:16px;bottom:16px;z-index:60;padding:10px 14px;border:none;border-radius:999px;background:linear-gradient(135deg,#2e7cf6,#00c2ff);color:#fff;font-weight:700;font-size:0.85rem;box-shadow:0 6px 20px rgba(13,15,19,0.25);cursor:pointer;opacity:0;transition:opacity .2s;pointer-events:none";
    document.body.appendChild(top);
    top.addEventListener("click", function () { window.scrollTo({ top: 0, behavior: "smooth" }); });
    // Weiterlesen, wo du aufgehört hast
    var saved = 0; try { saved = parseInt(localStorage.getItem(SCROLL_KEY) || "0", 10) || 0; } catch (e) {}
    if (saved > 600 && saved < document.documentElement.scrollHeight - window.innerHeight) {
      var pill = document.createElement("button");
      pill.type = "button"; pill.textContent = "⤵ Weiterlesen, wo du aufgehört hast"; pill.className = "no-print";
      pill.style.cssText = "position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:61;padding:11px 18px;border:none;border-radius:999px;background:#0d0f13;color:#fff;font-weight:600;font-size:0.9rem;box-shadow:0 8px 26px rgba(0,0,0,0.35);cursor:pointer;max-width:92vw";
      document.body.appendChild(pill);
      var hide = function () { if (pill && pill.parentNode) pill.parentNode.removeChild(pill); };
      pill.addEventListener("click", function () { window.scrollTo({ top: saved, behavior: "smooth" }); hide(); });
      setTimeout(hide, 9000);
    }
    // Leseposition merken (gedrosselt)
    var t = null;
    window.addEventListener("scroll", function () {
      var y = window.scrollY || window.pageYOffset;
      top.style.opacity = y > 500 ? "1" : "0";
      top.style.pointerEvents = y > 500 ? "auto" : "none";
      if (t) return;
      t = setTimeout(function () { t = null; try { localStorage.setItem(SCROLL_KEY, String(window.scrollY || window.pageYOffset)); } catch (e) {} }, 400);
    }, { passive: true });
  }
  /* Der Code ist der Entschlüsselungsschlüssel — falscher Code ⇒ Fehler. */
  async function attempt(code, silent) {
    var c = MM.vault.norm(code);
    if (!c) { if (!silent) { err.style.display = "block"; input.focus(); } return false; }
    try {
      var html = await MM.vault.open("protoVault", c);
      try { localStorage.setItem(STORE, c); } catch (e) {}
      show(html);
      return true;
    } catch (e) {
      if (!silent) { err.style.display = "block"; input.focus(); }
      return false;
    }
  }
  (async function init() {
    try {
      var urlCode = new URLSearchParams(location.search).get("code");
      if (urlCode && await attempt(urlCode, true)) {
        history.replaceState(null, "", location.pathname);
        return;
      }
      var saved = "";
      try { saved = localStorage.getItem(STORE) || ""; } catch (e) {}
      if (saved) await attempt(saved, true);
    } catch (e) { /* Gate bleibt sichtbar */ }
  })();
  if (btn) btn.addEventListener("click", function () { attempt(input.value); });
  if (input) input.addEventListener("keydown", function (e) { if (e.key === "Enter") attempt(input.value); });
})();
</script>
