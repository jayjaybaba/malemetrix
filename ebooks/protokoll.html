<script src="../js/affiliates.js"></script>
<script>
(function () {
  "use strict";
  var gate = document.getElementById("protoGate");
  var content = document.getElementById("protoContent");
  var input = document.getElementById("protoCode");
  var btn = document.getElementById("protoUnlock");
  var err = document.getElementById("protoErr");
  var STORE = "mm_protokoll_code";

  function show(html) {
    content.innerHTML = html;
    gate.hidden = true; content.hidden = false;
    if (window.MM && MM.track) MM.track("protokoll_unlocked", {});
  }
  /* Der Code ist der Entschlüsselungsschlüssel — falscher Code ⇒ Fehler. */
  async function attempt(code, silent) {
    var c = MM.vault.norm(code);
    if (!c) { if (!silent) { err.style.display = "block"; input.focus(); } return false; }
    try {
      var html = await MM.vault.open("protoVault", c);
      try { localStorage.setItem(STORE, c); } catch (e) {}
      show(html);
      return true;
    } catch (e) {
      if (!silent) { err.style.display = "block"; input.focus(); }
      return false;
    }
  }
  (async function init() {
    try {
      var urlCode = new URLSearchParams(location.search).get("code");
      if (urlCode && await attempt(urlCode, true)) {
        history.replaceState(null, "", location.pathname);
        return;
      }
      var saved = "";
      try { saved = localStorage.getItem(STORE) || ""; } catch (e) {}
      if (saved) await attempt(saved, true);
    } catch (e) { /* Gate bleibt sichtbar */ }
  })();
  if (btn) btn.addEventListener("click", function () { attempt(input.value); });
  if (input) input.addEventListener("keydown", function (e) { if (e.key === "Enter") attempt(input.value); });
})();
</script>
