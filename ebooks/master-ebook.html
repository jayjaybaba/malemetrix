<script>
(function () {
  "use strict";
  var gate = document.getElementById("masterGate");
  var content = document.getElementById("masterContent");
  var input = document.getElementById("masterCode");
  var btn = document.getElementById("masterUnlock");
  var err = document.getElementById("masterErr");
  var bar = document.getElementById("bpProgress");
  var STORE = "mm_master_code";
  var VAULTS = ["masterVaultMaster", "masterVaultProto", "masterVaultStack"];

  function progress() { var h = document.documentElement; var max = h.scrollHeight - h.clientHeight; bar.style.width = (max > 0 ? (h.scrollTop / max * 100) : 0) + "%"; }
  document.addEventListener("scroll", progress, { passive: true });

  function show(html) { content.innerHTML = html; gate.hidden = true; content.hidden = false; progress(); if (window.MM && MM.track) MM.track("master_unlocked", {}); }
  async function attempt(code, silent) {
    var c = MM.vault.norm(code);
    if (!c) { if (!silent) { err.style.display = "block"; input.focus(); } return false; }
    for (var i = 0; i < VAULTS.length; i++) {
      try {
        var html = await MM.vault.open(VAULTS[i], c);
        try { localStorage.setItem(STORE, c); } catch (e) {}
        show(html);
        return true;
      } catch (e) {}
    }
    if (!silent) { err.style.display = "block"; input.focus(); }
    return false;
  }
  (async function init() {
    try {
      var urlCode = new URLSearchParams(location.search).get("code");
      if (urlCode && await attempt(urlCode, true)) { history.replaceState(null, "", location.pathname); return; }
      var saved = ""; try { saved = localStorage.getItem(STORE) || ""; } catch (e) {}
      if (saved) await attempt(saved, true);
    } catch (e) {}
  })();
  if (btn) btn.addEventListener("click", function () { attempt(input.value); });
  if (input) input.addEventListener("keydown", function (e) { if (e.key === "Enter") attempt(input.value); });
})();
</script>
<script>
  (function(){var bar=document.getElementById("bpProgress");function upd(){var h=document.documentElement;var max=h.scrollHeight-h.clientHeight;bar.style.width=(max>0?(h.scrollTop/max*100):0)+"%";}document.addEventListener("scroll",upd,{passive:true});upd();})();
</script>
