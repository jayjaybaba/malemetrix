    content.innerHTML = html;
    gate.hidden = true;
    content.hidden = false;
    if (printBtn) printBtn.style.display = "";
  }
  async function attempt(pw, silent) {
    var p = MM.vault.norm(pw);
    if (!p) { if (!silent) fail(); return false; }
    try {
      var html = await MM.vault.open("internVault", p);
      try { localStorage.setItem(STORE, p); } catch (e) {}
      show(html);
      return true;
    } catch (e) {
      if (!silent) fail();
      return false;
    }
  }
  function fail() { err.style.display = "block"; input.focus(); input.select(); }

  (async function init() {
    var saved = "";
    try { saved = localStorage.getItem(STORE) || ""; } catch (e) {}
    if (saved) await attempt(saved, true);
  })();

  if (btn) btn.addEventListener("click", function () { attempt(input.value); });
  if (input) input.addEventListener("keydown", function (e) { if (e.key === "Enter") attempt(input.value); });
  if (input) input.addEventListener("input", function () { err.style.display = "none"; });
})();
</script>
</body>
</html>
