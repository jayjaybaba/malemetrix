  <style>
    /* ------- Report-„Paper“ (hell, druckoptimiert) ------- */
    .paper-wrap { padding: calc(var(--header-h) + 40px) 0 60px; }
    .paper {
      background: #ffffff;
      color: #16181d;
      max-width: 860px;
      margin: 0 auto;
      border-radius: 14px;
      padding: clamp(32px, 5vw, 64px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .paper h1, .paper h2, .paper h3 { color: #0d0f13; }
    .paper .r-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      border-bottom: 3px solid #16181d; padding-bottom: 20px; margin-bottom: 32px; gap: 20px; flex-wrap: wrap;
    }
    .paper .r-logo { font-family: var(--font-display); font-weight: 700; font-size: 1.5rem; }
    .paper .r-logo span { color: #2e7cf6; }
    .paper .r-meta { font-family: var(--font-mono); font-size: 0.75rem; color: #6b7484; text-align: right; line-height: 1.8; }
    .paper .r-title { font-size: clamp(1.7rem, 4vw, 2.4rem); margin-bottom: 6px; letter-spacing: -0.02em; }
    .paper .r-sub { color: #5b6472; font-size: 1rem; margin-bottom: 32px; }
    .paper .r-section { margin: 38px 0; page-break-inside: avoid; }
    .paper .r-section > h2 {
      font-size: 1.15rem; text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1.5px solid #e3e6eb; padding-bottom: 10px; margin-bottom: 18px;
      font-family: var(--font-mono); font-weight: 700; color: #2e7cf6;
    }
    .paper p, .paper li { color: #3a4150; font-size: 0.95rem; line-height: 1.7; }
    .paper .r-score-banner {
      display: flex; gap: 28px; align-items: center; background: #f4f6f9;
      border: 1px solid #e3e6eb; border-radius: 14px; padding: 26px; flex-wrap: wrap;
    }
    .paper .r-score-num { font-family: var(--font-display); font-size: 3.6rem; font-weight: 700; line-height: 1; color: #0d0f13; }
    .paper .r-score-num small { font-size: 1.2rem; color: #9aa3b2; }
    .paper .r-bars { display: grid; gap: 12px; }
    .paper .r-bar-row { display: grid; grid-template-columns: 110px 1fr 48px; gap: 14px; align-items: center; font-size: 0.85rem; }
    .paper .r-bar-row .nm { font-weight: 600; color: #16181d; }
    .paper .r-bar-track { height: 9px; border-radius: 5px; background: #e9edf2; overflow: hidden; }
    .paper .r-bar-fill { height: 100%; border-radius: 5px; }
    .paper .r-bar-row .vl { font-family: var(--font-mono); font-size: 0.8rem; color: #5b6472; text-align: right; }
    .paper .r-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    @media (max-width: 680px) { .paper .r-grid-2 { grid-template-columns: 1fr; } }
    .paper .r-box { background: #f4f6f9; border: 1px solid #e3e6eb; border-radius: 12px; padding: 20px; }
    .paper .r-box h3 { font-size: 1rem; margin-bottom: 8px; }
    .paper .r-tag { display: inline-block; font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: #2e7cf6; margin-bottom: 8px; font-weight: 700; }
    .paper ol.r-steps { counter-reset: step; display: grid; gap: 12px; padding: 0; }
    .paper ol.r-steps li { list-style: none; display: flex; gap: 14px; }
    .paper ol.r-steps li::before {
      counter-increment: step; content: "0" counter(step);
      font-family: var(--font-mono); font-weight: 700; color: #2e7cf6; flex-shrink: 0;
    }
    .paper .r-plan-day { display: grid; grid-template-columns: 70px 1fr; gap: 16px; padding: 12px 0; border-bottom: 1px solid #edf0f4; }
    .paper .r-plan-day:last-child { border-bottom: none; }
    .paper .r-plan-day .d { font-family: var(--font-mono); font-size: 0.75rem; font-weight: 700; color: #2e7cf6; padding-top: 2px; }
    .paper .r-plan-day ul { display: grid; gap: 4px; padding: 0; }
    .paper .r-plan-day li { list-style: none; font-size: 0.88rem; display: flex; gap: 8px; }
    .paper .r-plan-day li::before { content: "·"; color: #2e7cf6; font-weight: 700; }
    .paper table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .paper table th, .paper table td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e9edf2; color: #3a4150; }
    .paper table th { font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #9aa3b2; }
    .paper table td:first-child { font-weight: 600; color: #16181d; }
    .paper .r-check-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; }
    @media (max-width: 600px) { .paper .r-check-cols { grid-template-columns: 1fr; } }
    .paper .r-check-cols li { list-style: none; font-size: 0.85rem; padding: 4px 0; display: flex; gap: 10px; }
    .paper .r-check-cols li::before { content: "☐"; color: #2e7cf6; }
    .paper .r-disclaimer { background: #fff8ec; border: 1px solid #f3e3c0; border-radius: 12px; padding: 18px 20px; font-size: 0.8rem; color: #7a6a45 !important; }
    .paper .r-footer { margin-top: 40px; padding-top: 18px; border-top: 1.5px solid #e3e6eb; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 0.7rem; color: #9aa3b2; flex-wrap: wrap; gap: 8px; }

    .report-toolbar {
      max-width: 860px; margin: 0 auto 22px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: space-between; align-items: center;
    }

    @media print {
      @page { margin: 14mm; }
      body { background: #fff !important; }
      .paper-wrap { padding: 0; }
      .paper { box-shadow: none; border-radius: 0; padding: 0; max-width: none; }
      .report-toolbar { display: none !important; }
      .r-section { page-break-inside: avoid; }
    }
  </style>
